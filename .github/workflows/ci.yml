name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Menor privilégio: o GITHUB_TOKEN só lê o repo.
permissions:
  contents: read

jobs:
  api:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: naregua
          POSTGRES_PASSWORD: "123456"
          POSTGRES_DB: naregua
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U naregua"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://naregua:123456@localhost:5432/naregua?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit de dependências (prod, falha em high+)
        run: pnpm --filter @naregua/api audit --prod --audit-level high

      - name: Lint
        run: pnpm --filter @naregua/api lint

      - name: Build
        run: pnpm --filter @naregua/api build

      - name: Migrar banco
        run: pnpm --filter @naregua/api migrate:deploy

      - name: Testes unitários e de integração
        run: pnpm --filter @naregua/api test

      - name: Testes e2e
        run: pnpm --filter @naregua/api test:e2e
